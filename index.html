<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BabyKart Store</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>👶 BabyKart Store</h1>

        <div class="cart-box">
            🛒 Cart: <span id="cart">0</span>
        </div>
    </header>

    <section class="products">

        <div class="product">
            <img src="https://images.unsplash.com/photo-1519238263530-99bdd11df2ea?w=400" alt="">
            <h3>Baby Clothes</h3>
            <p>₹499</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1584305574647-acf8069a0658?w=400" alt="">
            <h3>Milk Bottle</h3>
            <p>₹299</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1566576912321-d58ddd7a6088?w=400" alt="">
            <h3>Baby Shoes</h3>
            <p>₹699</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1587654780291-39c9404d746b?w=400" alt="">
            <h3>Baby Toy</h3>
            <p>₹399</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1596462502278-27bfdc403348?w=400" alt="">
            <h3>Baby Shampoo</h3>
            <p>₹249</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1615486363973-f79d8757809f?w=400" alt="">
            <h3>Baby Food</h3>
            <p>₹199</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
